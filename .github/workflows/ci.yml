name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: go vet
        run: go vet ./...
      - name: tests
        run: go test ./...
      - name: docker build
        run: docker build .
      - name: docker compose smoke
        run: ./scripts/smoke-local.sh

