name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing semver tag to release, for example v0.1.2"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Verify release inputs
        run: |
          go test ./cmd/agent-analyzer
          go vet ./cmd/agent-analyzer
      - name: Select GoReleaser publishers
        id: goreleaser-args
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
        run: |
          args="release --clean"
          if [ -z "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
            args="$args --skip=homebrew"
          fi
          if [ -z "$SCOOP_BUCKET_GITHUB_TOKEN" ]; then
            args="$args --skip=scoop"
          fi
          echo "args=$args" >> "$GITHUB_OUTPUT"
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: ${{ steps.goreleaser-args.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}

  npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Build npm package binaries
        run: |
          set -eu
          tag="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          fi
          version="${tag#v}"
          commit="$(git rev-parse HEAD)"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          npm version "$version" --no-git-tag-version --allow-same-version
          AGENT_ANALYZER_VERSION="$version" \
            AGENT_ANALYZER_COMMIT="$commit" \
            AGENT_ANALYZER_DATE="$date" \
            scripts/build-npm-binaries.sh
      - name: Verify npm package
        run: scripts/smoke-npm-package.sh
      - name: Publish npm package
        run: npm publish --provenance --access public
